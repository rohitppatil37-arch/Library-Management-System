<body>

<div class="board-header">
  <h1>नवीन पुस्तक नोंद</h1>
</div>

<div class="form-box">

<input id="name" placeholder="पुस्तकाचे नाव">
<input id="author" placeholder="लेखकाचे नाव">
<input id="price" placeholder="किंमत">
<input id="publisher" placeholder="प्रकाशक">

<select id="type">
<option>कथासंग्रह</option>
<option>कादंबरी</option>
<option>प्रवास वर्णन</option>
<option>ललित लेख</option>
<option>चरित्र / आत्मचरित्र</option>
<option>ऐतिहासिक</option>
<option>इतर</option>
</select>

<input id="bookNo" placeholder="पुस्तक क्रमांक">
<input id="reader" placeholder="वाचकाचे नाव">
<input id="issueDate" type="date">
<input id="returnDate" type="date">

<textarea id="remark"></textarea>

<button onclick="saveBook()">Submit</button>

</div>

<script src="app.js"></script>
</body>
