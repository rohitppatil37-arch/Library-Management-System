<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

<div class="login-wrapper">

  <!-- LEFT SIDE -->
  <div class="login-left">
    <h1>📚 अभ्यासिका</h1>
    <p>Library Management System</p>
    <p>ग्रंथालय व्यवस्थापन प्रणाली</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="login-box">

    <h2>Login / लॉगिन</h2>

    <input id="user" placeholder="Username / वापरकर्ता नाव">
    <input id="pass" type="password" placeholder="Password / पासवर्ड">

    <button onclick="login()">Login / लॉगिन</button>

    <div class="login-footer">
      <small>Admin Access Only</small><br>
      <small>फक्त प्रशासकासाठी</small>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
