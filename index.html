<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

<!-- HEADER -->
<div class="app-header">
  <h2>स्मृती वनराई परिवार, संचलित</h2>
  <h1>कै. विष्णु रामचंद्र खाडे</h1>
  <h1>अभ्यासिका</h1>
  <p>रामराई, बावची</p>
</div>

<div class="login-wrapper">

  <div class="login-box">
    <h2>Login / लॉगिन</h2>

    <input id="user" placeholder="Username / वापरकर्ता नाव">
    <input id="pass" type="password" placeholder="Password / पासवर्ड">

    <button onclick="login()">Login / लॉगिन</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
