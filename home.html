<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-main">

<div class="topbar">
  <h2>📚 Library Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <input type="text" class="search" placeholder="🔍 पुस्तक / लेखक / अ.क्र. शोधा..." onkeyup="searchBook(this.value)">

  <div id="results"></div>

  <button class="add-btn" onclick="goForm()">➕ नवीन पुस्तक नोंद</button>

</div>
<div class="bottom-nav">
  <button onclick="goForm()">➕ Add</button>
  <button onclick="location.reload()">🔍 Search</button>
  <button onclick="logout()">🚪 Logout</button>
</div>
<script src="script.js"></script>
</body>
</html>
